<!DOCTYPE html>
<html class="dark" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Sensor - IoT Smart Home</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#34a7ad",
                        "background-light": "#fafafa",
                        "background-dark": "#17191c",
                        "surface": "#23282f",
                        "accent-temp": "#ff4d4d",
                        "accent-hum": "#00d2ff",
                        "accent-light": "#ffea00",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>

<body>
    <div class="layout-container">
        <header
            class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-8 py-3 bg-white/50 dark:bg-background-dark/50 backdrop-blur-md">
            <div class="flex items-center gap-20">
                <p></p>
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-primary rounded-lg text-white">
                        <span class="material-symbols-outlined block">nest_eco_leaf</span>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight text-white">IOT<span
                            class="text-primary">SMASHHOME</span>
                    </h1>
                </div>
            </div>
            <div class="flex items-center gap-20">
                <nav class="hidden md:flex items-center gap-8">
                    <a class="text-slate-500 hover:text-primary transition-colors" href="dashboard.html">DashBoard</a>
                    <a class="text-primary font-semibold transition-colors" href="data-sensor.html">Data Sensor</a>
                    <a class="text-slate-500 hover:text-primary transition-colors" href="active-history.html">Active
                        History</a>
                    <a href="profile.html"
                        class="h-10 w-10 rounded-full bg-primary/20 border-2 border-primary overflow-hidden hover:scale-110 transition-transform">
                        <img class="w-full h-full object-cover" alt="User profile picture"
                            src="assets/images/thach.png" />
                    </a>
                </nav>
                <p></p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Page Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                <h1 class="text-2xl font-bold text-white tracking-tight">Data Sensor</h1>
                <div class="flex items-center gap-3">
                    <div class="relative max-w-md w-full">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 z-20 pointer-events-none">search</span>
                        <input type="text" id="search-input"
                            class="block w-full pr-4 py-2.5 bg-slate-800/40 backdrop-blur-md border border-slate-700/50 rounded-xl text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-lg"
                            style="padding-left: 2.75rem !important;"
                            placeholder="Search by temp, humidity, light, time...">
                    </div>
                    <button class="filter-toggle-btn" id="filter-toggle" onclick="toggleFilterPanel()">
                        <span class="material-symbols-outlined">filter_list</span>
                        Filter
                    </button>
                </div>
            </div>

            <!-- Filter Panel -->
            <div class="filter-panel" id="filter-panel">
                <div class="filter-panel-inner">
                    <div class="filter-group">
                        <label>Temperature (°C)</label>
                        <div class="range-inputs" style="display:flex;align-items:center;gap:6px;">
                            <input type="number" id="filter-temp-min" placeholder="Min" style="width:80px;">
                            <span class="range-sep">–</span>
                            <input type="number" id="filter-temp-max" placeholder="Max" style="width:80px;">
                        </div>
                    </div>
                    <div class="filter-group">
                        <label>Humidity (%)</label>
                        <div class="range-inputs" style="display:flex;align-items:center;gap:6px;">
                            <input type="number" id="filter-hum-min" placeholder="Min" style="width:80px;">
                            <span class="range-sep">–</span>
                            <input type="number" id="filter-hum-max" placeholder="Max" style="width:80px;">
                        </div>
                    </div>
                    <div class="filter-group">
                        <label>Light (lux)</label>
                        <div class="range-inputs" style="display:flex;align-items:center;gap:6px;">
                            <input type="number" id="filter-light-min" placeholder="Min" style="width:80px;">
                            <span class="range-sep">–</span>
                            <input type="number" id="filter-light-max" placeholder="Max" style="width:80px;">
                        </div>
                    </div>
                    <div class="filter-group">
                        <label>From</label>
                        <input type="datetime-local" id="filter-date-from">
                    </div>
                    <div class="filter-group">
                        <label>To</label>
                        <input type="datetime-local" id="filter-date-to">
                    </div>
                    <div class="filter-actions">
                        <button class="filter-btn reset" onclick="resetFilters()">Reset</button>
                        <button class="filter-btn apply" onclick="applyFilters()">Apply</button>
                    </div>
                </div>
            </div>

            <!-- Table Container -->
            <div class="table-container">
                <div class="table-header">
                    <div class="table-title">
                        <span class="material-symbols-outlined">sensors</span>
                        Sensor Data Records
                    </div>
                    <div class="table-count">
                        Total: <span id="total-records">0</span> records
                    </div>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>
                                <div class="th-content">
                                    ID
                                    <span class="material-symbols-outlined">unfold_more</span>
                                </div>
                            </th>
                            <th>
                                <div class="th-content">
                                    Temperature (°C)
                                    <span class="material-symbols-outlined">unfold_more</span>
                                </div>
                            </th>
                            <th>
                                <div class="th-content">
                                    Humidity (%)
                                    <span class="material-symbols-outlined">unfold_more</span>
                                </div>
                            </th>
                            <th>
                                <div class="th-content">
                                    Light (lux)
                                    <span class="material-symbols-outlined">unfold_more</span>
                                </div>
                            </th>
                            <th>
                                <div class="th-content">
                                    Time
                                    <span class="material-symbols-outlined">unfold_more</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="sensor-table-body">
                        <!-- Data will be loaded dynamically -->
                    </tbody>
                </table>

                <!-- Pagination -->
                <div class="pagination-container">
                    <div class="pagination-info">
                        Showing <span id="showing-start">0</span> - <span id="showing-end">0</span>
                        of <span id="showing-total">0</span> entries
                    </div>
                    <div class="pagination-controls" id="pagination-controls">
                        <!-- Pagination buttons will be loaded dynamically -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/datasensor.js"></script>
</body>

</html>
